  <rect x="832" y="390" width="322" height="110" rx="14" fill="#312e81"/>
  <text x="852" y="412" font-family="'Malgun Gothic',sans-serif" font-size="12" fill="#c4b5fd">[역할] 5년 경력 경영분석가</text>
