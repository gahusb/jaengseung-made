      <rect x="984" y="242" width="148" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="984" y="242" width="148" height="6" rx="3" fill="#059669"/>
      <rect x="996" y="258" width="60" height="10" rx="5" fill="#d1fae5"/>
