  <text x="52" y="576" font-family="'Malgun Gothic','Apple SD Gothic Neo',sans-serif" font-size="10.5" fill="rgba(255,255,255,0.3)">* 과거 성과가 미래 수익을 보장하지 않습니다.</text>

